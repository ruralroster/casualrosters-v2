<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Rosters - Shift Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; border-bottom: 1px solid #e0e0e0; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; font-weight: 600; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #2c3e50; color: white; }
        .btn-primary:hover { background: #1a252f; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: white; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); text-align: center; max-width: 400px; }
        .login-card h2 { font-size: 28px; margin-bottom: 10px; color: #2c3e50; }
        .login-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .login-button { width: 100%; padding: 12px; margin-top: 20px; }
        .dashboard { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .tab-button { padding: 12px 20px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-size: 14px; color: #666; transition: all 0.2s; }
        .tab-button.active { color: #2c3e50; border-bottom-color: #2c3e50; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 4px; }
        .tab-content.active { display: block; }
        .tab-content h3 { margin-bottom: 15px; }
        .tab-content p { color: #666; font-size: 14px; margin-bottom: 15px; }
        .message { padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f0f0f0; padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        tr:hover { background: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .location-item { display: flex; align-items: center; gap: 10px; margin: 12px 0; padding: 10px; border-radius: 4px; }
        .location-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .location-item label { cursor: pointer; margin-bottom: 0; flex: 1; }
        .shift-item { background: #f9f9f9; border-left: 4px solid #000; padding: 15px; margin-bottom: 12px; border-radius: 4px; }
        .shift-item.red { border-left-color: #dc3545; background: #ffe6e6; }
        .shift-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .shift-item-header strong { font-size: 16px; flex: 1; }
        .shift-item-meta { color: #666; font-size: 13px; margin-bottom: 10px; }
        .shift-item-actions { display: flex; gap: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>Rural Rosters</h2>
        <input type="email" id="emailInput" class="login-input" placeholder="Email address">
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" onkeypress="if(event.key==='Enter') loginWithEmail()">
        <button class="btn-primary login-button" onclick="loginWithEmail()">Login</button>
    </div>
</div>

<div id="mainDashboard" class="dashboard">
    <div class="container">
        <header>
            <h1>Rural Rosters</h1>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="btn-secondary" onclick="logout()">Logout</button>
            </div>
        </header>
        <div id="messageContainer"></div>
        <div class="tabs" id="tabsContainer"></div>
        <div id="tabsContent"></div>
    </div>
</div>

<div id="denyReasonModal" class="modal">
    <div class="modal-content">
        <h3>Deny Swap Verification</h3>
        <p>Provide a reason for denying this swap request:</p>
        <textarea id="denyReason" style="width: 100%; height: 100px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;" placeholder="Enter reason..."></textarea>
        <div class="modal-buttons">
            <button class="btn-danger" onclick="submitDenySwapVerification()">Deny</button>
            <button class="btn-secondary" onclick="closeDenyModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let BACKEND_URL = 'https://ruralrostersproxy-staging-168129620374.australia-southeast1.run.app';
    let currentUser = null;
    let userRole = null;
    let userLocations = [];
    let officerLocations = [];
    let jobTypesByLocation = {};
    let allLocations = [];
    let allShifts = [];
    let marketplaceListings = [];
    let pendingSwapToApprove = null;

    const google = {
        script: {
            run: {
                withSuccessHandler: function(callback) {
                    return {
                        checkUserExists: async (email, password) => {
                            const result = await callBackend('checkUserExists', {email, password});
                            if (callback) callback(result);
                        },
                        getLocations: async () => {
                            const result = await callBackend('getLocations', {});
                            if (callback) callback(result);
                        },
                        getJobTypesByLocation: async () => {
                            const result = await callBackend('getJobTypesByLocation', {});
                            if (callback) callback(result);
                        },
                        getOfficerLocations: async (email) => {
                            const result = await callBackend('getOfficerLocations', {email});
                            if (callback) callback(result);
                        },
                        getOfficerVacancies: async (email) => {
                            const result = await callBackend('getOfficerVacancies', {email});
                            if (callback) callback(result);
                        },
                        saveOfficerVacancies: async (email, vacancies) => {
                            const result = await callBackend('saveOfficerVacancies', {email, vacancies});
                            if (callback) callback(result);
                        },
                        getStaffAvailableShifts: async (email) => {
                            const result = await callBackend('getStaffAvailableShifts', {email});
                            if (callback) callback(result);
                        },
                        getMarketplaceListings: async (email) => {
                            const result = await callBackend('getMarketplaceListings', {email});
                            if (callback) callback(result);
                        },
                        listShiftForSwap: async (email, name, date, jobType, location, isServiceDisruption) => {
                            const result = await callBackend('listShiftForSwap', {email, name, date, jobType, location, isServiceDisruption});
                            if (callback) callback(result);
                        },
                        getOfficerPendingSwapVerifications: async (email) => {
                            const result = await callBackend('getOfficerPendingSwapVerifications', {email});
                            if (callback) callback(result);
                        },
                        approveSwapVerification: async (staffEmail, staffName, date, jobType, location) => {
                            const result = await callBackend('approveSwapVerification', {staffEmail, staffName, date, jobType, location});
                            if (callback) callback(result);
                        },
                        denySwapVerification: async (staffEmail, staffName, date, jobType, location, reason) => {
                            const result = await callBackend('denySwapVerification', {staffEmail, staffName, date, jobType, location, reason});
                            if (callback) callback(result);
                        },
                        getStaffCurrentSwaps: async (email) => {
                            const result = await callBackend('getStaffCurrentSwaps', {email});
                            if (callback) callback(result);
                        },
                        getOfficerMarketplaceClaimsApprovals: async (email) => {
                            const result = await callBackend('getOfficerMarketplaceClaimsApprovals', {email});
                            if (callback) callback(result);
                        },
                        approveMarketplaceClaim: async (claimingEmail, originalEmail, date, jobType, location) => {
                            const result = await callBackend('approveMarketplaceClaim', {claimingEmail, originalEmail, date, jobType, location});
                            if (callback) callback(result);
                        },
                        denyMarketplaceClaim: async (claimingEmail, originalEmail, date, jobType, location) => {
                            const result = await callBackend('denyMarketplaceClaim', {claimingEmail, originalEmail, date, jobType, location});
                            if (callback) callback(result);
                        }
                    };
                }
            }
        }
    };
    
    async function callBackend(action, params) {
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action, params})
            });
            return await response.json();
        } catch(err) {
            console.error('Backend error:', err);
            return { error: err.toString() };
        }
    }

    function loginWithEmail() {
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value;
        
        if (!email || !password) {
            showMessage('Please enter both email and password', 'error');
            return;
        }

        google.script.run.withSuccessHandler(function(user) {
            if (user && user.error) {
                showMessage(user.error, 'error');
                return;
            }
            if (user) {
                currentUser = { email: user.email, name: user.name };
                userRole = user.role;
                userLocations = user.locations ? user.locations.split(',').map(l => l.trim()) : [];
                showDashboard();
            }
        }).checkUserExists(email, password);
    }

    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        document.getElementById('userNameDisplay').textContent = currentUser.name || currentUser.email;
        
        loadGlobalData();
    }

    function loadGlobalData() {
        google.script.run.withSuccessHandler(function(locations) {
            allLocations = locations || [];
            
            google.script.run.withSuccessHandler(function(jobTypes) {
                jobTypesByLocation = jobTypes || {};
                setupTabs();
                
                if (userRole === 'Officer') {
                    loadOfficerData();
                } else {
                    loadStaffData();
                }
            }).getJobTypesByLocation();
        }).getLocations();
    }

    function setupTabs() {
        const tabsContainer = document.getElementById('tabsContainer');
        const tabsContent = document.getElementById('tabsContent');
        
        tabsContainer.innerHTML = '';
        tabsContent.innerHTML = '';

        if (userRole === 'Officer') {
            tabsContainer.innerHTML = `
                <button class="tab-button active" onclick="switchTab(0, this)">My Vacancies</button>
                <button class="tab-button" onclick="switchTab(1, this)">Shift Cover Approvals</button>
                <button class="tab-button" onclick="switchTab(2, this)">Swap Verification Requests</button>
            `;
            
            tabsContent.innerHTML = `
                <div id="tab-0" class="tab-content active">
                    <h3>My Vacancies</h3>
                    <button class="btn-primary" onclick="addVacancyRow()">+ Add Shift</button>
                    <button class="btn-primary" onclick="saveVacancies()" style="margin-left: 10px;">Save Changes</button>
                    <div id="vacanciesContainer"></div>
                </div>
                <div id="tab-1" class="tab-content">
                    <h3>Shift Cover Approvals</h3>
                    <div id="approvalsContainer"></div>
                </div>
                <div id="tab-2" class="tab-content">
                    <h3>Swap Verification Requests</h3>
                    <div id="swapVerifyContainer"></div>
                </div>
            `;
        } else {
            tabsContainer.innerHTML = `
                <button class="tab-button active" onclick="switchTab(0, this)">Available Shifts</button>
                <button class="tab-button" onclick="switchTab(1, this)">Shift Swaps</button>
                <button class="tab-button" onclick="switchTab(2, this)">Settings</button>
            `;
            
            tabsContent.innerHTML = `
                <div id="tab-0" class="tab-content active">
                    <h3>Available Shifts & Marketplace</h3>
                    <button class="btn-primary" onclick="requestShifts()" style="margin-bottom: 15px;">Request Selected Shifts</button>
                    <div id="shiftsContainer"></div>
                </div>
                <div id="tab-1" class="tab-content">
                    <h3>Shift Swaps</h3>
                    <div id="currentSwapsContainer"></div>
                    <h4 style="margin-top: 30px; margin-bottom: 15px;">List a New Shift for Swap</h4>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="swapDate" />
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <select id="swapLocation" onchange="updateSwapJobTypes()">
                            <option value="">Select Location</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Job Type</label>
                        <select id="swapJobType">
                            <option value="">Select Job Type</option>
                        </select>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                        <input type="checkbox" id="swapIsServiceDisruption" />
                        <label for="swapIsServiceDisruption" style="margin-bottom: 0;">Service-disruption shift</label>
                    </div>
                    <button class="btn-primary" onclick="submitListShift()">List Shift for Swap</button>
                </div>
                <div id="tab-2" class="tab-content">
                    <h3>Settings</h3>
                    <h4 style="margin-bottom: 15px;">Work Location Preferences</h4>
                    <div class="location-list" id="locationList"></div>
                    <button class="btn-primary" onclick="saveSettings()" style="margin-top: 20px;">Save Settings</button>
                </div>
            `;
        }
    }

    function switchTab(idx, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + idx).classList.add('active');
        btn.classList.add('active');
        
        if (userRole === 'Officer') {
            if (idx === 1) loadOfficerApprovals();
            if (idx === 2) loadOfficerSwapVerifications();
        } else {
            if (idx === 0) loadStaffAvailableShifts();
            if (idx === 1) loadStaffCurrentSwaps();
            if (idx === 2) loadSettingsScreen();
        }
    }

    function showMessage(text, type) {
        const container = document.getElementById('messageContainer');
        const messageEl = document.createElement('div');
        messageEl.className = 'message ' + type;
        messageEl.textContent = text;
        container.innerHTML = '';
        container.appendChild(messageEl);
        setTimeout(() => { if (messageEl.parentNode) messageEl.remove(); }, 5000);
    }

    // OFFICER FUNCTIONS
    function loadOfficerData() {
        google.script.run.withSuccessHandler(function(locations) {
            officerLocations = locations || [];
            loadOfficerVacancies();
        }).getOfficerLocations(currentUser.email);
    }

    function loadOfficerVacancies() {
        google.script.run.withSuccessHandler(function(vacancies) {
            renderVacanciesTable(vacancies || []);
        }).getOfficerVacancies(currentUser.email);
    }

    function renderVacanciesTable(vacancies) {
        const container = document.getElementById('vacanciesContainer');
        
        if (!vacancies || vacancies.length === 0) {
            container.innerHTML = '<p style="color: #999;">No vacancies yet</p>';
            return;
        }

        let html = '<table><tr><th>Date</th><th>Location</th><th>Job Type</th><th>Action</th></tr>';
        
        vacancies.forEach((vac, idx) => {
            let dateString = '';
            if (vac.date && vac.date.includes('/')) {
                const parts = vac.date.split('/');
                if (parts.length === 3) {
                    dateString = parts[2] + '-' + String(parts[1]).padStart(2, '0') + '-' + String(parts[0]).padStart(2, '0');
                }
            }
            
            const location = String(vac.location).trim();
            
            // EXISTING shift: Location and Job Type are FIXED TEXT
            html += '<tr><td><input type="date" class="vac-date" value="' + dateString + '" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td><td style="padding: 12px;">' + location + '</td><td style="padding: 12px;">' + vac.jobType + '</td><td><button class="btn-secondary" onclick="removeVacancyRow(this)" style="padding: 4px 8px; font-size: 12px;">Remove</button></td></tr>';
        });
        html += '</table>';
        container.innerHTML = html;
    }

    function addVacancyRow() {
        const container = document.getElementById('vacanciesContainer');
        let table = container.querySelector('table');
        
        if (!table) {
            container.innerHTML = '<table><tr><th>Date</th><th>Location</th><th>Job Type</th><th>Action</th></tr></table>';
            table = container.querySelector('table');
        }
        
        const newRow = table.insertRow();
        
        let locationOptions = '<select class="vac-location" onchange="updateNewRowJobTypes(this)" style="width: 100%; padding: 4px;"><option value="">Select Location</option>';
        officerLocations.forEach(loc => {
            locationOptions += '<option value="' + loc + '">' + loc + '</option>';
        });
        locationOptions += '</select>';
        
        newRow.innerHTML = '<td><input type="date" class="vac-date" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td><td>' + locationOptions + '</td><td><select class="vac-jobtype" style="width: 100%; padding: 4px; border: 1px solid #ddd;"><option value="">Select Job Type</option></select></td><td><button class="btn-secondary" onclick="removeVacancyRow(this)" style="padding: 4px 8px; font-size: 12px;">Remove</button></td>';
    }

    function updateNewRowJobTypes(select) {
        const location = select.value;
        const jobTypeSelect = select.parentElement.parentElement.querySelector('.vac-jobtype');
        const jobTypes = jobTypesByLocation[location] || [];
        
        jobTypeSelect.innerHTML = '<option value="">Select Job Type</option>';
        jobTypes.forEach(jt => {
            const opt = document.createElement('option');
            opt.value = jt;
            opt.textContent = jt;
            jobTypeSelect.appendChild(opt);
        });
    }

    function removeVacancyRow(btn) {
        btn.parentElement.parentElement.remove();
    }

    function saveVacancies() {
        const rows = document.querySelectorAll('#vacanciesContainer table tr');
        const vacancies = [];
        
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const dateInput = row.querySelector('.vac-date');
            const jobtypeInput = row.querySelector('.vac-jobtype');
            const locationInput = row.querySelector('.vac-location');
            
            if (dateInput && jobtypeInput && locationInput) {
                let date = dateInput.value;
                const jobType = jobtypeInput.value;
                const location = locationInput.value;
                
                if (date && date.includes('-')) {
                    const [year, month, day] = date.split('-');
                    date = day + '/' + month + '/' + year;
                }
                
                if (date && jobType && location) {
                    vacancies.push({ date, jobType, location });
                }
            }
        }

        showMessage('Saving vacancies...', 'info');

        google.script.run.withSuccessHandler(function() {
            showMessage('✓ Vacancies saved', 'success');
            loadOfficerVacancies();
        }).saveOfficerVacancies(currentUser.email, vacancies);
    }

    function loadOfficerApprovals() {
        showMessage('Loading approvals...', 'info');
        
        google.script.run.withSuccessHandler(function(claims) {
            renderOfficerApprovals(claims || []);
        }).getOfficerMarketplaceClaimsApprovals(currentUser.email);
    }

    function renderOfficerApprovals(claims) {
        const container = document.getElementById('approvalsContainer');
        
        if (!claims || claims.length === 0) {
            container.innerHTML = '<p style="color: #999;">No pending approvals</p>';
            return;
        }

        const groupedByShift = {};
        claims.forEach(claim => {
            const key = claim.date + '|' + claim.jobType + '|' + claim.location;
            if (!groupedByShift[key]) {
                groupedByShift[key] = [];
            }
            groupedByShift[key].push(claim);
        });

        let html = '';
        for (let shiftKey in groupedByShift) {
            const claimList = groupedByShift[shiftKey];
            const firstClaim = claimList[0];
            
            html += '<div class="shift-item"><div class="shift-item-header"><strong>' + firstClaim.date + ' - ' + firstClaim.jobType + ' @ ' + firstClaim.location + '</strong><span style="color: #666; font-size: 13px; margin-left: auto;">' + claimList.length + ' applicant(s)</span></div>';
            
            claimList.forEach((claim, idx) => {
                const isFirst = idx === 0 ? ' (FIRST)' : '';
                html += '<div style="padding: 10px; background: white; margin: 8px 0; border-radius: 4px;"><div style="margin-bottom: 8px;"><strong>' + claim.claimingName + '</strong>' + isFirst + '</div><div style="color: #666; font-size: 13px; margin-bottom: 8px;">Claimed: ' + claim.claimedTimestamp + '</div>';
                
                if (idx === 0) {
                    html += '<div style="display: flex; gap: 10px;"><button class="btn-success" onclick="approveMarketplaceClaim(\'' + claim.claimingEmail + '\', \'' + claim.originalEmail + '\', \'' + claim.date + '\', \'' + claim.jobType + '\', \'' + claim.location + '\')" style="padding: 6px 12px; font-size: 12px;">Approve</button><button class="btn-danger" onclick="denyMarketplaceClaim(\'' + claim.claimingEmail + '\', \'' + claim.originalEmail + '\', \'' + claim.date + '\', \'' + claim.jobType + '\', \'' + claim.location + '\')" style="padding: 6px 12px; font-size: 12px;">Deny</button></div>';
                } else {
                    html += '<div style="color: #999; font-size: 12px;">Awaiting decision on first applicant</div>';
                }
                
                html += '</div>';
            });
            
            html += '</div>';
        }

        container.innerHTML = html;
    }

    function approveMarketplaceClaim(claimingEmail, originalEmail, date, jobType, location) {
        showMessage('Approving claim...', 'info');
        
        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Claim approved', 'success');
                loadOfficerApprovals();
            }
        }).approveMarketplaceClaim(claimingEmail, originalEmail, date, jobType, location);
    }

    function denyMarketplaceClaim(claimingEmail, originalEmail, date, jobType, location) {
        showMessage('Denying claim...', 'info');
        
        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Claim denied', 'success');
                loadOfficerApprovals();
            }
        }).denyMarketplaceClaim(claimingEmail, originalEmail, date, jobType, location);
    }

    function loadOfficerSwapVerifications() {
        showMessage('Loading swap verifications...', 'info');
        
        google.script.run.withSuccessHandler(function(swaps) {
            renderOfficerSwapVerifications(swaps || []);
        }).getOfficerPendingSwapVerifications(currentUser.email);
    }

    function renderOfficerSwapVerifications(swaps) {
        const container = document.getElementById('swapVerifyContainer');
        
        if (!swaps || swaps.length === 0) {
            container.innerHTML = '<p style="color: #999;">No pending swap verifications</p>';
            return;
        }

        let html = '';
        swaps.forEach((swap) => {
            html += `
                <div class="shift-item">
                    <div class="shift-item-header">
                        <strong>${swap.staffName}</strong>
                        <span style="color: #666;">${swap.date} - ${swap.jobType} @ ${swap.location}</span>
                    </div>
                    <div class="shift-item-actions">
                        <button class="btn-success" onclick="approveSwapVerification('${swap.staffEmail}', '${swap.staffName}', '${swap.date}', '${swap.jobType}', '${swap.location}')">Approve</button>
                        <button class="btn-danger" onclick="openDenyModal('${swap.staffEmail}', '${swap.staffName}', '${swap.date}', '${swap.jobType}', '${swap.location}')">Deny</button>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    function approveSwapVerification(staffEmail, staffName, date, jobType, location) {
        showMessage('Approving swap verification...', 'info');
        
        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Swap verified and moved to marketplace', 'success');
                loadOfficerSwapVerifications();
            }
        }).approveSwapVerification(staffEmail, staffName, date, jobType, location);
    }

    function openDenyModal(staffEmail, staffName, date, jobType, location) {
        pendingSwapToApprove = { staffEmail, staffName, date, jobType, location };
        document.getElementById('denyReasonModal').classList.add('active');
    }

    function closeDenyModal() {
        document.getElementById('denyReasonModal').classList.remove('active');
        document.getElementById('denyReason').value = '';
        pendingSwapToApprove = null;
    }

    function submitDenySwapVerification() {
        if (!pendingSwapToApprove) return;
        
        const reason = document.getElementById('denyReason').value.trim();
        if (!reason) {
            showMessage('Please provide a reason for denial', 'error');
            return;
        }

        showMessage('Denying swap verification...', 'info');
        
        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Swap denied', 'success');
                closeDenyModal();
                loadOfficerSwapVerifications();
            }
        }).denySwapVerification(pendingSwapToApprove.staffEmail, pendingSwapToApprove.staffName, pendingSwapToApprove.date, pendingSwapToApprove.jobType, pendingSwapToApprove.location, reason);
    }

    // STAFF FUNCTIONS
    function loadStaffData() {
        populateSwapLocations();
        loadSettingsScreen();
        loadStaffCurrentSwaps();
        loadStaffAvailableShifts();
    }

    function populateSwapLocations() {
        const select = document.getElementById('swapLocation');
        select.innerHTML = '<option value="">Select Location</option>';
        userLocations.forEach(loc => {
            const opt = document.createElement('option');
            opt.value = loc;
            opt.textContent = loc;
            select.appendChild(opt);
        });
    }

    function updateSwapJobTypes() {
        const location = document.getElementById('swapLocation').value;
        const jobTypeSelect = document.getElementById('swapJobType');
        const jobTypes = jobTypesByLocation[location] || [];
        
        jobTypeSelect.innerHTML = '<option value="">Select Job Type</option>';
        jobTypes.forEach(jt => {
            const opt = document.createElement('option');
            opt.value = jt;
            opt.textContent = jt;
            jobTypeSelect.appendChild(opt);
        });
    }

    function loadStaffCurrentSwaps() {
        google.script.run.withSuccessHandler(function(swaps) {
            renderStaffCurrentSwaps(swaps || []);
        }).getStaffCurrentSwaps(currentUser.email);
    }

    function renderStaffCurrentSwaps(swaps) {
        const container = document.getElementById('currentSwapsContainer');
        
        if (!swaps || swaps.length === 0) {
            container.innerHTML = '<p style="color: #999;">No shifts currently listed for swap</p>';
            return;
        }

        let html = '<h4>Current Shifts Up for Swap</h4>';
        swaps.forEach((swap) => {
            html += `
                <div class="shift-item ${swap.isServiceDisruption ? 'red' : ''}">
                    <div class="shift-item-header">
                        <strong>${swap.date} - ${swap.jobType} @ ${swap.location}</strong>
                        ${swap.isServiceDisruption ? '<span style="color: #dc3545; font-weight: bold;">SERVICE-DISRUPTION</span>' : ''}
                    </div>
                    <div class="shift-item-meta">Status: ${swap.status}</div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    function loadStaffAvailableShifts() {
        showMessage('Loading shifts...', 'info');
        
        google.script.run.withSuccessHandler(function(shifts) {
            allShifts = shifts || [];
            
            google.script.run.withSuccessHandler(function(marketplace) {
                marketplaceListings = marketplace || [];
                renderAllShifts();
            }).getMarketplaceListings(currentUser.email);
        }).getStaffAvailableShifts(currentUser.email);
    }

    function renderAllShifts() {
        const container = document.getElementById('shiftsContainer');
        
        const allItems = [];
        
        (allShifts || []).forEach((shift, idx) => {
            allItems.push({
                type: 'available',
                idx: idx,
                date: shift.date,
                jobType: shift.jobType,
                location: shift.location
            });
        });
        
        (marketplaceListings || []).forEach((listing) => {
            allItems.push({
                type: 'marketplace',
                date: listing.date,
                jobType: listing.jobType,
                location: listing.location,
                originalName: listing.originalName,
                isServiceDisruption: listing.isServiceDisruption
            });
        });

        if (allItems.length === 0) {
            container.innerHTML = '<p style="color: #999;">No shifts available</p>';
            return;
        }

        let html = '';
        allItems.forEach((item) => {
            const colorClass = item.isServiceDisruption ? 'red' : '';
            
            if (item.type === 'marketplace') {
                html += `
                    <div class="shift-item ${colorClass}">
                        <div class="shift-item-header">
                            <strong>${item.date} - ${item.jobType} @ ${item.location}</strong>
                            ${item.isServiceDisruption ? '<span style="color: #dc3545; font-weight: bold;">SERVICE-DISRUPTION</span>' : ''}
                        </div>
                        <div class="shift-item-meta">Offered by: ${item.originalName}</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="shift-item ${colorClass}">
                        <div class="shift-item-header">
                            <input type="checkbox" class="shift-checkbox" value="${item.idx}" style="margin-right: 10px;">
                            <label style="margin-bottom: 0; flex: 1;"><strong>${item.date} - ${item.jobType} @ ${item.location}</strong></label>
                        </div>
                    </div>
                `;
            }
        });
        
        container.innerHTML = html;
    }

    function submitListShift() {
        const date = document.getElementById('swapDate').value;
        const location = document.getElementById('swapLocation').value;
        const jobType = document.getElementById('swapJobType').value;
        const isServiceDisruption = document.getElementById('swapIsServiceDisruption').checked;

        if (!date || !location || !jobType) {
            showMessage('Please fill in all fields', 'error');
            return;
        }

        if (!userLocations.includes(location)) {
            showMessage('You can only list shifts for locations in your settings', 'error');
            return;
        }

        showMessage('Submitting swap request...', 'info');

        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Swap request submitted! Officer will verify.', 'success');
                document.getElementById('swapDate').value = '';
                document.getElementById('swapLocation').value = '';
                document.getElementById('swapJobType').value = '';
                document.getElementById('swapIsServiceDisruption').checked = false;
                loadStaffCurrentSwaps();
            }
        }).listShiftForSwap(currentUser.email, currentUser.name, date, jobType, location, isServiceDisruption);
    }

    function loadSettingsScreen() {
        const container = document.getElementById('locationList');
        if (!container) return;
        
        let html = '';
        allLocations.forEach(loc => {
            const checked = userLocations.includes(loc) ? ' checked' : '';
            html += `
                <div class="location-item">
                    <input type="checkbox" id="loc-${loc}" value="${loc}"${checked}>
                    <label for="loc-${loc}">${loc}</label>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    function saveSettings() {
        const locCheckboxes = document.querySelectorAll('#locationList input[type="checkbox"]');
        const locs = Array.from(locCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
        
        if (locs.length === 0) {
            showMessage('Please select at least one location', 'error');
            return;
        }
        
        showMessage('Saving settings...', 'info');
        userLocations = locs;
        populateSwapLocations();
        showMessage('✓ Settings saved', 'success');
    }

    function requestShifts() {
        const checkboxes = document.querySelectorAll('.shift-checkbox:checked');
        if (checkboxes.length === 0) {
            showMessage('Please select at least one shift', 'error');
            return;
        }

        showMessage('Requesting shifts...', 'info');
        setTimeout(() => showMessage('✓ Shift request(s) sent!', 'success'), 1000);
    }

    function logout() {
        currentUser = null;
        userRole = null;
        userLocations = [];
        document.getElementById('mainDashboard').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('emailInput').value = '';
        document.getElementById('passwordInput').value = '';
    }
</script>

</body>
</html>
