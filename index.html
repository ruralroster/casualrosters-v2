<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Rosters - Shift Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; border-bottom: 1px solid #e0e0e0; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; font-weight: 600; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #2c3e50; color: white; }
        .btn-primary:hover { background: #1a252f; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: white; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); text-align: center; max-width: 400px; }
        .login-card h2 { font-size: 28px; margin-bottom: 10px; color: #2c3e50; }
        .login-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .login-button { width: 100%; padding: 12px; margin-top: 20px; }
        .dashboard { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .tab-button { padding: 12px 20px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-size: 14px; color: #666; transition: all 0.2s; }
        .tab-button.active { color: #2c3e50; border-bottom-color: #2c3e50; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 4px; }
        .tab-content.active { display: block; }
        .tab-content h3 { margin-bottom: 15px; }
        .tab-content h4 { margin-bottom: 15px; margin-top: 20px; font-size: 16px; border-bottom: 1px solid #e0e0e0; padding-bottom: 10px; }
        .message { padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: inherit; }
        .location-item { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
        .location-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .location-item label { cursor: pointer; margin-bottom: 0; }
        .shift-item { background: #f9f9f9; border-left: 4px solid #000; padding: 15px; margin-bottom: 12px; border-radius: 4px; }
        .shift-item.red { border-left-color: #dc3545; background: #ffe6e6; }
        .shift-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .shift-item-header strong { font-size: 16px; flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f0f0f0; padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-weight: 600; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        td input[type="date"], td input[type="text"] { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; }
        td input[disabled] { background: #f9f9f9; cursor: not-allowed; }
        a { color: #2c3e50; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .applicant-row { background: white; border: 1px solid #e0e0e0; padding: 12px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .applicant-info { flex: 1; }
        .applicant-buttons { display: flex; gap: 8px; }
        .applicant-buttons button { padding: 6px 12px; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .fortnight-grid { display: grid; grid-template-columns: repeat(14, 1fr); gap: 5px; margin: 15px 0; }
        .fortnight-day { text-align: center; font-size: 11px; font-weight: 600; padding: 8px; background: #f0f0f0; border-radius: 3px; }
        .fortnight-checkbox { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; padding: 8px; background: white; border: 1px solid #ddd; border-radius: 3px; min-height: 80px; }
        .fortnight-checkbox input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>Rural Rosters</h2>
        <input type="email" id="emailInput" class="login-input" placeholder="Email address">
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" onkeypress="if(event.key==='Enter') loginWithEmail()">
        <button class="btn-primary login-button" onclick="loginWithEmail()">Login</button>
    </div>
</div>

<div id="mainDashboard" class="dashboard">
    <div class="container">
        <header>
            <h1>Rural Rosters</h1>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="btn-secondary" onclick="logout()">Logout</button>
            </div>
        </header>
        <div id="messageContainer"></div>
        <div class="tabs" id="tabsContainer"></div>
        <div id="tabsContent"></div>
    </div>
</div>

<div id="denySwapModal" class="modal">
    <div class="modal-content">
        <h3>Deny Swap Request</h3>
        <p>Provide a reason for denying this swap:</p>
        <textarea id="denyReason" style="width: 100%; height: 100px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;" placeholder="Enter reason..."></textarea>
        <div class="modal-buttons">
            <button class="btn-danger" onclick="submitDenySwap()">Deny Swap</button>
            <button class="btn-secondary" onclick="closeDenyModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="fortnightModal" class="modal">
    <div class="modal-content">
        <h3>Select Available Days for Swap</h3>
        <p>Check which days in this fortnight you can work:</p>
        <div id="fortnightGrid"></div>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="submitFortnightSelection()">Confirm</button>
            <button class="btn-secondary" onclick="closeFortnightModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
