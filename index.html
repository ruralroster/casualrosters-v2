<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Rosters - Shift Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; border-bottom: 1px solid #e0e0e0; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; font-weight: 600; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #2c3e50; color: white; }
        .btn-primary:hover { background: #1a252f; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: white; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); text-align: center; max-width: 400px; }
        .login-card h2 { font-size: 28px; margin-bottom: 10px; color: #2c3e50; }
        .login-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .login-button { width: 100%; padding: 12px; margin-top: 20px; }
        .dashboard { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
        .tab-button { padding: 12px 20px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-size: 14px; color: #666; transition: all 0.2s; }
        .tab-button.active { color: #2c3e50; border-bottom-color: #2c3e50; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 4px; }
        .tab-content.active { display: block; }
        .tab-content h3 { margin-bottom: 15px; }
        .tab-content h4 { margin-bottom: 15px; }
        .message { padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .location-item { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
        .location-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .location-item label { cursor: pointer; margin-bottom: 0; }
        .shift-item { background: #f9f9f9; border-left: 4px solid #000; padding: 15px; margin-bottom: 12px; border-radius: 4px; }
        .shift-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .shift-item-header strong { font-size: 16px; flex: 1; }
        .shift-item-actions { display: flex; gap: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f0f0f0; padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>Rural Rosters</h2>
        <input type="email" id="emailInput" class="login-input" placeholder="Email address">
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" onkeypress="if(event.key==='Enter') loginWithEmail()">
        <button class="btn-primary login-button" onclick="loginWithEmail()">Login</button>
    </div>
</div>

<div id="mainDashboard" class="dashboard">
    <div class="container">
        <header>
            <h1>Rural Rosters</h1>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="btn-secondary" onclick="logout()">Logout</button>
            </div>
        </header>
        <div id="messageContainer"></div>
        <div class="tabs" id="tabsContainer"></div>
        <div id="tabsContent"></div>
    </div>
</div>

<script>
    const BACKEND_URL = 'https://ruralrostersproxy-staging-168129620374.australia-southeast1.run.app';
    const LOCATIONS = ['Innisfail', 'Mareeba', 'Tully', 'Yarrabah', 'Atherton', 'Mossman', 'Babinda', 'Cairns', 'Telehealth', 'TestHub'];
    
    let currentUser = null;
    let userRole = null;
    let userLocations = [];

    async function callBackend(action, params) {
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action, params})
            });
            return await response.json();
        } catch(err) {
            console.error('Backend error:', err);
            return { error: err.toString() };
        }
    }

    function loginWithEmail() {
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value;
        
        if (!email || !password) {
            showMessage('Please enter both email and password', 'error');
            return;
        }

        callBackend('checkUserExists', {email, password}).then(user => {
            if (user && user.error) {
                showMessage(user.error, 'error');
                return;
            }
            if (user) {
                currentUser = { email: user.email, name: user.name };
                userRole = user.role;
                userLocations = user.locations ? user.locations.split(',').map(l => l.trim()) : [];
                showDashboard();
            }
        });
    }

    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        document.getElementById('userNameDisplay').textContent = currentUser.name || currentUser.email;
        setupTabs();
    }

    function setupTabs() {
        const tabsContainer = document.getElementById('tabsContainer');
        const tabsContent = document.getElementById('tabsContent');
        
        tabsContainer.innerHTML = '';
        tabsContent.innerHTML = '';

        if (userRole === 'Officer') {
            tabsContainer.innerHTML = `
                <button class="tab-button active" onclick="switchTab(0, this)">My Vacancies</button>
                <button class="tab-button" onclick="switchTab(1, this)">Shift Cover Approvals</button>
                <button class="tab-button" onclick="switchTab(2, this)">Pending Swaps</button>
            `;
            tabsContent.innerHTML = `
                <div id="tab-0" class="tab-content active">
                    <h3>My Vacancies</h3>
                    <button class="btn-primary" onclick="addVacancyRow()">+ Add Shift</button>
                    <button class="btn-primary" onclick="saveVacancies()" style="margin-left: 10px;">Save Changes</button>
                    <div id="vacanciesContainer"></div>
                </div>
                <div id="tab-1" class="tab-content"><h3>Shift Cover Approvals</h3><div id="approvalsContainer"></div></div>
                <div id="tab-2" class="tab-content"><h3>Pending Swaps</h3><div id="swapsContainer"></div></div>
            `;
        } else {
            tabsContainer.innerHTML = `
                <button class="tab-button active" onclick="switchTab(0, this)">Available Shifts</button>
                <button class="tab-button" onclick="switchTab(1, this)">Shift Swaps</button>
                <button class="tab-button" onclick="switchTab(2, this)">Settings</button>
            `;
            tabsContent.innerHTML = `
                <div id="tab-0" class="tab-content active"><h3>Available Shifts</h3><div id="shiftsContainer"></div></div>
                <div id="tab-1" class="tab-content">
                    <h3>Shift Swaps</h3>
                    <h4>Current Shifts Up for Swap</h4>
                    <div id="currentSwapsContainer"></div>
                    <h4 style="margin-top: 30px;">List a New Shift for Swap</h4>
                    <div class="form-group"><label>Date</label><input type="date" id="swapDate" /></div>
                    <div class="form-group"><label>Location</label><select id="swapLocation" onchange="updateSwapJobTypes()"><option value="">Select Location</option></select></div>
                    <div class="form-group"><label>Job Type</label><select id="swapJobType"><option value="">Select Job Type</option></select></div>
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;"><input type="checkbox" id="swapIsServiceDisruption" /><label for="swapIsServiceDisruption" style="margin-bottom: 0;">Service-disruption shift</label></div>
                    <button class="btn-primary" onclick="submitListShift()">List Shift for Swap</button>
                </div>
                <div id="tab-2" class="tab-content">
                    <h3>Settings</h3>
                    <h4>Work Location Preferences</h4>
                    <div id="locationList"></div>
                    <button class="btn-primary" style="margin-top: 20px;" onclick="saveSettings()">Save Settings</button>
                </div>
            `;
            populateSwapLocations();
            loadLocationCheckboxes();
        }
    }

    function switchTab(idx, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + idx).classList.add('active');
        btn.classList.add('active');
        
        if (userRole === 'Officer') {
            if (idx === 0) loadMyVacancies();
            if (idx === 1) loadOfficerApprovals();
            if (idx === 2) loadPendingSwaps();
        } else {
            if (idx === 0) loadStaffShifts();
            if (idx === 1) loadCurrentSwaps();
        }
    }

    // OFFICER FUNCTIONS
    function loadOfficerApprovals() {
        showMessage('Loading approvals...', 'info');
        callBackend('getOfficerPendingApprovals', {email: currentUser.email}).then(claims => {
            renderApprovals(claims || []);
        });
    }

    function renderApprovals(claims) {
        const container = document.getElementById('approvalsContainer');
        
        if (!claims || claims.length === 0) {
            container.innerHTML = '<p style="color: #999;">No pending approvals</p>';
            return;
        }

        const grouped = {};
        claims.forEach(claim => {
            const key = claim.date + '|' + claim.jobType + '|' + claim.location;
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(claim);
        });

        let html = '';
        for (let key in grouped) {
            const claimList = grouped[key];
            const first = claimList[0];
            html += `<div class="shift-item">
                <div class="shift-item-header">
                    <strong>${first.date} - ${first.jobType} @ ${first.location}</strong>
                    <span style="color: #666; font-size: 13px;">${claimList.length} applicant(s)</span>
                </div>`;
            
            claimList.forEach((claim, idx) => {
                const isFirst = idx === 0 ? ' (FIRST)' : '';
                html += `<div style="padding: 10px; background: white; margin: 8px 0; border-radius: 4px;">
                    <div style="margin-bottom: 8px;"><strong>${claim.claimingName}</strong>${isFirst}</div>
                    <div style="color: #666; font-size: 13px;">Claimed: ${claim.claimedTimestamp}</div>`;
                
                if (idx === 0) {
                    html += `<div style="display: flex; gap: 10px;">
                        <button class="btn-success" style="padding: 6px 12px; font-size: 12px;" onclick="approveSwapCall('${claim.claimingEmail}', '${claim.claimingName}', '${claim.originalEmail}', '${claim.originalName}', '${claim.date}', '${claim.jobType}', '${claim.location}')">Approve</button>
                        <button class="btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="denySwapCall('${claim.claimingEmail}', '${claim.claimingName}', '${claim.originalEmail}', '${claim.originalName}', '${claim.date}', '${claim.jobType}', '${claim.location}')">Deny</button>
                    </div>`;
                } else {
                    html += '<div style="color: #999; font-size: 12px;">Awaiting decision on first applicant</div>';
                }
                html += '</div>';
            });
            html += '</div>';
        }
        container.innerHTML = html;
    }

    function approveSwapCall(claimingEmail, claimingName, originalEmail, originalName, date, jobType, location) {
        showMessage('Approving swap...', 'info');
        callBackend('approveSwap', {
            claimingEmail, claimingName, originalEmail, originalName,
            officerEmail: currentUser.email,
            officerName: currentUser.name,
            date, jobType, location
        }).then(result => {
            if (result.error) showMessage(result.error, 'error');
            else { showMessage('✓ Approved', 'success'); loadOfficerApprovals(); }
        });
    }

    function denySwapCall(claimingEmail, claimingName, originalEmail, originalName, date, jobType, location) {
        showMessage('Denying swap...', 'info');
        callBackend('denySwap', {
            claimingEmail, claimingName, originalEmail, originalName,
            officerEmail: currentUser.email,
            officerName: currentUser.name,
            date, jobType, location
        }).then(result => {
            if (result.error) showMessage(result.error, 'error');
            else { showMessage('✓ Denied', 'success'); loadOfficerApprovals(); }
        });
    }

    function loadMyVacancies() {
        showMessage('Loading vacancies...', 'info');
        callBackend('getOfficerVacancies', {email: currentUser.email}).then(vacancies => {
            renderVacancies(vacancies || []);
        });
    }

    function renderVacancies(vacancies) {
        const container = document.getElementById('vacanciesContainer');
        
        if (!vacancies || vacancies.length === 0) {
            container.innerHTML = '<p style="color: #999;">No vacancies yet</p>';
            return;
        }

        let html = '<table><tr><th>Date</th><th>Location</th><th>Job Type</th><th>Action</th></tr>';
        
        vacancies.forEach((vac) => {
            let dateString = '';
            if (vac.date && vac.date.includes('/')) {
                const parts = vac.date.split('/');
                if (parts.length === 3) {
                    dateString = parts[2] + '-' + String(parts[1]).padStart(2, '0') + '-' + String(parts[0]).padStart(2, '0');
                }
            }
            
            html += `<tr>
                <td><input type="date" class="vac-date" value="${dateString}" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td>
                <td style="padding: 12px;">${vac.location}</td>
                <td style="padding: 12px;">${vac.jobType}</td>
                <td><button class="btn-secondary" onclick="removeVacancyRow(this)" style="padding: 4px 8px; font-size: 12px;">Remove</button></td>
            </tr>`;
        });
        html += '</table>';
        container.innerHTML = html;
    }

    function addVacancyRow() {
        const container = document.getElementById('vacanciesContainer');
        let table = container.querySelector('table');
        
        if (!table) {
            container.innerHTML = '<table><tr><th>Date</th><th>Location</th><th>Job Type</th><th>Action</th></tr></table>';
            table = container.querySelector('table');
        }
        
        const newRow = table.insertRow();
        newRow.innerHTML = `<td><input type="date" class="vac-date" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td>
        <td><input type="text" class="vac-location" placeholder="Location" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td>
        <td><input type="text" class="vac-jobtype" placeholder="Job Type" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td>
        <td><button class="btn-secondary" onclick="removeVacancyRow(this)" style="padding: 4px 8px; font-size: 12px;">Remove</button></td>`;
    }

    function removeVacancyRow(btn) {
        btn.parentElement.parentElement.remove();
    }

    function saveVacancies() {
        const rows = document.querySelectorAll('#vacanciesContainer table tr');
        const vacancies = [];
        
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const dateInput = row.querySelector('.vac-date');
            const jobtypeInput = row.querySelector('.vac-jobtype');
            const locationInput = row.querySelector('.vac-location');
            
            if (dateInput && jobtypeInput && locationInput) {
                let date = dateInput.value;
                const jobType = jobtypeInput.value;
                const location = locationInput.value;
                
                if (date && date.includes('-')) {
                    const [year, month, day] = date.split('-');
                    date = day + '/' + month + '/' + year;
                }
                
                if (date && jobType && location) {
                    vacancies.push({ date, jobType, location });
                }
            }
        }

        if (vacancies.length === 0) {
            showMessage('No valid vacancies to save', 'error');
            return;
        }

        showMessage('Saving vacancies...', 'info');

        callBackend('saveOfficerVacancies', {
            email: currentUser.email,
            vacancies: vacancies
        }).then(result => {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Vacancies saved', 'success');
                loadMyVacancies();
            }
        });
    }

    function loadPendingSwaps() {
        showMessage('Loading pending swaps...', 'info');
        callBackend('getOfficerMarketplaceListings', {email: currentUser.email}).then(listings => {
            renderPendingSwaps(listings || []);
        });
    }

    function renderPendingSwaps(listings) {
        const container = document.getElementById('swapsContainer');
        
        if (!listings || listings.length === 0) {
            container.innerHTML = '<p style="color: #999;">No pending swaps</p>';
            return;
        }

        let html = '';
        listings.forEach(listing => {
            const color = listing.isServiceDisruption ? '#ffe6e6' : '#f9f9f9';
            const borderColor = listing.isServiceDisruption ? '#dc3545' : '#000';
            html += `<div style="background: ${color}; border-left: 4px solid ${borderColor}; padding: 15px; margin-bottom: 12px; border-radius: 4px;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <strong>${listing.date} - ${listing.jobType} @ ${listing.location}</strong>
                    ${listing.isServiceDisruption ? '<span style="color: #dc3545; font-weight: bold;">SERVICE-DISRUPTION</span>' : ''}
                </div>
                <div style="color: #666; font-size: 13px;">Offered by: ${listing.originalName}</div>
            </div>`;
        });
        
        container.innerHTML = html;
    }

    // STAFF FUNCTIONS
    function loadStaffShifts() {
        showMessage('Loading shifts...', 'info');
        callBackend('getStaffAvailableShifts', {email: currentUser.email}).then(shifts => {
            const container = document.getElementById('shiftsContainer');
            if (!shifts || shifts.length === 0) {
                container.innerHTML = '<p style="color: #999;">No shifts available</p>';
            } else {
                let html = '<table><tr><th>Date</th><th>Job Type</th><th>Location</th></tr>';
                shifts.forEach(s => {
                    html += `<tr><td>${s.date}</td><td>${s.jobType}</td><td>${s.location}</td></tr>`;
                });
                html += '</table>';
                container.innerHTML = html;
            }
            showMessage('', '');
        });
    }

    function loadCurrentSwaps() {
        callBackend('getMarketplaceListings', {email: currentUser.email}).then(swaps => {
            const container = document.getElementById('currentSwapsContainer');
            if (!swaps || swaps.length === 0) {
                container.innerHTML = '<p style="color: #999;">No shifts currently listed for swap</p>';
            } else {
                let html = '';
                swaps.forEach(s => {
                    html += `<div class="shift-item"><strong>${s.date} - ${s.jobType} @ ${s.location}</strong><div style="color: #666; font-size: 13px;">Offered by: ${s.originalName}</div></div>`;
                });
                container.innerHTML = html;
            }
        });
    }

    function populateSwapLocations() {
        const select = document.getElementById('swapLocation');
        select.innerHTML = '<option value="">Select Location</option>';
        userLocations.forEach(loc => {
            const opt = document.createElement('option');
            opt.value = loc;
            opt.textContent = loc;
            select.appendChild(opt);
        });
    }

    function updateSwapJobTypes() {
        // Placeholder - job types would need to come from backend
        document.getElementById('swapJobType').innerHTML = '<option value="">Select Job Type</option>';
    }

    function submitListShift() {
        const date = document.getElementById('swapDate').value;
        const location = document.getElementById('swapLocation').value;
        const jobType = document.getElementById('swapJobType').value;
        const isServiceDisruption = document.getElementById('swapIsServiceDisruption').checked;

        if (!date || !location || !jobType) {
            showMessage('Please fill in all fields', 'error');
            return;
        }

        showMessage('Submitting swap request...', 'info');
        callBackend('listShiftForSwap', {
            email: currentUser.email,
            name: currentUser.name,
            date, jobType, location, isServiceDisruption
        }).then(result => {
            if (result.error) showMessage(result.error, 'error');
            else {
                showMessage('✓ Swap request submitted!', 'success');
                document.getElementById('swapDate').value = '';
                document.getElementById('swapLocation').value = '';
                document.getElementById('swapJobType').value = '';
                document.getElementById('swapIsServiceDisruption').checked = false;
                loadCurrentSwaps();
            }
        });
    }

    function loadLocationCheckboxes() {
        const container = document.getElementById('locationList');
        let html = '';
        LOCATIONS.forEach(loc => {
            const checked = userLocations.includes(loc) ? ' checked' : '';
            html += `<div class="location-item"><input type="checkbox" id="loc-${loc}" value="${loc}"${checked}><label for="loc-${loc}">${loc}</label></div>`;
        });
        container.innerHTML = html;
    }

    function saveSettings() {
        const checkboxes = document.querySelectorAll('#locationList input[type="checkbox"]:checked');
        userLocations = Array.from(checkboxes).map(cb => cb.value);
        
        if (userLocations.length === 0) {
            showMessage('Please select at least one location', 'error');
            return;
        }
        
        showMessage('✓ Settings saved', 'success');
        populateSwapLocations();
    }

    function showMessage(text, type) {
        const container = document.getElementById('messageContainer');
        if (!text) {
            container.innerHTML = '';
            return;
        }
        const messageEl = document.createElement('div');
        messageEl.className = 'message ' + type;
        messageEl.textContent = text;
        container.innerHTML = '';
        container.appendChild(messageEl);
        if (type !== 'error') setTimeout(() => { if (messageEl.parentNode) messageEl.remove(); }, 3000);
    }

    function logout() {
        document.getElementById('mainDashboard').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('emailInput').value = '';
        document.getElementById('passwordInput').value = '';
    }
</script>

</body>
</html>
