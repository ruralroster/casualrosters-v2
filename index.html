<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Rosters - Shift Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2c3e50;
            color: white;
        }

        .btn-primary:hover {
            background: #1a252f;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: white;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        .login-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .login-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
        }

        .dashboard {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: #2c3e50;
            border-bottom-color: #2c3e50;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 4px;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h3 {
            margin-bottom: 15px;
        }

        .tab-content p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .vacancies-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .vacancies-table th {
            background: #f0f0f0;
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-weight: 600;
        }

        .vacancies-table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .vacancies-table tr:hover {
            background: #f9f9f9;
        }

        .location-list {
            margin: 20px 0;
        }

        .location-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            padding: 10px;
            border-radius: 4px;
        }

        .location-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .location-item label {
            cursor: pointer;
            margin-bottom: 0;
            flex: 1;
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>Rural Rosters</h2>
        <p id="loadingText" style="color: #999; font-size: 14px; margin-bottom: 20px;">Connecting...</p>
        <input type="email" id="emailInput" class="login-input" placeholder="Email address">
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" onkeypress="if(event.key==='Enter') loginWithEmail()">
        <button class="btn-primary login-button" onclick="loginWithEmail()">Login</button>
    </div>
</div>

<div id="mainDashboard" class="dashboard">
    <div class="container">
        <header>
            <h1>Rural Rosters</h1>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="btn-secondary" onclick="logout()">Logout</button>
            </div>
        </header>

        <div id="messageContainer"></div>

        <div class="tabs" id="tabsContainer"></div>

        <div id="tabsContent"></div>
    </div>
</div>

<script>
    let BACKEND_URL = 'https://ruralrostersproxy-staging-168129620374.australia-southeast1.run.app';
    
    window.addEventListener('load', async function() {
        document.getElementById('loadingText').style.display = 'none';
    });
    
    const google = {
        script: {
            run: {
                withSuccessHandler: function(callback) {
                    return {
                        checkUserExists: async (email, password) => {
                            const result = await callBackend('checkUserExists', {email, password});
                            if (callback) callback(result);
                        },
                        getOfficerLocations: async (email) => {
                            const result = await callBackend('getOfficerLocations', {email});
                            if (callback) callback(result);
                        },
                        getOfficerVacancies: async (email) => {
                            const result = await callBackend('getOfficerVacancies', {email});
                            if (callback) callback(result);
                        },
                        getJobTypesForOfficer: async (email) => {
                            const result = await callBackend('getJobTypesForOfficer', {email});
                            if (callback) callback(result);
                        },
                        saveOfficerVacancies: async (email, vacancies) => {
                            const result = await callBackend('saveOfficerVacancies', {email, vacancies});
                            if (callback) callback(result);
                        }
                    };
                }
            }
        }
    };
    
    async function callBackend(action, params) {
        if (!BACKEND_URL) {
            console.error('Backend URL not loaded');
            return { error: 'Backend not ready' };
        }
        
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action, params})
            });
            return await response.json();
        } catch(err) {
            console.error('Backend error:', err);
            return { error: err.toString() };
        }
    }
    
    let currentUser = null;
    let userRole = null;
    let userLocations = [];
    let jobTypesByLocation = {};

    function loginWithEmail() {
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value;
        
        if (!email || !password) {
            showMessage('Please enter both email and password', 'error');
            return;
        }

        google.script.run.withSuccessHandler(function(user) {
            if (user && user.error) {
                showMessage(user.error, 'error');
                return;
            }
            if (user) {
                currentUser = { email: user.email, name: user.name };
                userRole = user.role;
                userLocations = user.locations ? user.locations.split(',').map(l => l.trim()) : [];
                showDashboard();
            }
        }).checkUserExists(email, password);
    }

    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        document.getElementById('userNameDisplay').textContent = currentUser.name || currentUser.email;
        
        setupTabs();
        
        if (userRole === 'Officer') {
            loadOfficerData();
        }
    }

    function setupTabs() {
        const tabsContainer = document.getElementById('tabsContainer');
        const tabsContent = document.getElementById('tabsContent');
        
        tabsContainer.innerHTML = '';
        tabsContent.innerHTML = '';

        if (userRole === 'Officer') {
            tabsContainer.innerHTML = `
                <button class="tab-button active" onclick="switchTab(0, this)">My Vacancies</button>
                <button class="tab-button" onclick="switchTab(1, this)">Shift Cover Approvals</button>
                <button class="tab-button" onclick="switchTab(2, this)">Swap Verification Requests</button>
            `;
            
            tabsContent.innerHTML = `
                <div id="tab-0" class="tab-content active">
                    <h3>My Vacancies</h3>
                    <button class="btn-primary" onclick="addVacancyRow()">+ Add Shift</button>
                    <button class="btn-primary" onclick="saveVacancies()" style="margin-left: 10px;">Save Changes</button>
                    <div id="vacanciesContainer"></div>
                </div>
                <div id="tab-1" class="tab-content">
                    <h3>Shift Cover Approvals</h3>
                    <p>Staff members claiming shifts from the marketplace</p>
                    <div id="approvalsContainer"></div>
                </div>
                <div id="tab-2" class="tab-content">
                    <h3>Swap Verification Requests</h3>
                    <p>Verify staff members are rostered before allowing them to offer shifts for swap</p>
                    <div id="swapVerifyContainer"></div>
                </div>
            `;
        } else {
            tabsContainer.innerHTML = `
                <button class="tab-button active" onclick="switchTab(0, this)">Available Shifts</button>
                <button class="tab-button" onclick="switchTab(1, this)">List Shift for Swap</button>
                <button class="tab-button" onclick="switchTab(2, this)">Settings</button>
            `;
            
            tabsContent.innerHTML = `
                <div id="tab-0" class="tab-content active">
                    <h3>Available Shifts & Marketplace</h3>
                    <p>Staff interface coming soon</p>
                </div>
                <div id="tab-1" class="tab-content">
                    <h3>List Shift for Swap</h3>
                    <p>Staff interface coming soon</p>
                </div>
                <div id="tab-2" class="tab-content">
                    <h3>Settings</h3>
                    <p>Staff interface coming soon</p>
                </div>
            `;
        }
    }

    function switchTab(idx, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + idx).classList.add('active');
        btn.classList.add('active');
    }

    function showMessage(text, type) {
        const container = document.getElementById('messageContainer');
        const messageEl = document.createElement('div');
        messageEl.className = 'message ' + type;
        messageEl.textContent = text;
        container.innerHTML = '';
        container.appendChild(messageEl);
        setTimeout(() => { if (messageEl.parentNode) messageEl.remove(); }, 5000);
    }

    function loadOfficerData() {
        showMessage('Loading vacancies...', 'info');
        
        google.script.run.withSuccessHandler(function(jobTypes) {
            jobTypesByLocation = jobTypes || {};
            
            google.script.run.withSuccessHandler(function(vacancies) {
                renderVacanciesTable(vacancies || []);
                showMessage('', 'success');
            }).getOfficerVacancies(currentUser.email);
        }).getJobTypesForOfficer(currentUser.email);
    }

    function renderVacanciesTable(vacancies) {
        const container = document.getElementById('vacanciesContainer');
        
        if (!vacancies || vacancies.length === 0) {
            container.innerHTML = '<p style="color: #999;">No vacancies yet</p>';
            return;
        }

        const sorted = vacancies.sort((a, b) => {
            const dateA = parseDate(a.date);
            const dateB = parseDate(b.date);
            return dateA - dateB;
        });

        let html = '<table class="vacancies-table"><tr><th>Date</th><th>Location</th><th>Job Type</th><th>Action</th></tr>';
        
        sorted.forEach((vac, idx) => {
            let dateString = '';
            if (vac.date && vac.date.includes('/')) {
                const parts = vac.date.split('/');
                if (parts.length === 3) {
                    const day = String(parts[0]).padStart(2, '0');
                    const month = String(parts[1]).padStart(2, '0');
                    const year = parts[2];
                    dateString = year + '-' + month + '-' + day;
                }
            }
            
            const location = String(vac.location).trim();
            const jobTypes = jobTypesByLocation[location] || [];
            
            let jobTypeOptions = '<select class="vac-jobtype" style="width: 100%; padding: 4px; border: 1px solid #ddd;"><option value="">Select Job Type</option>';
            jobTypes.forEach(jt => {
                const selected = jt === vac.jobType ? ' selected' : '';
                jobTypeOptions += '<option value="' + jt + '"' + selected + '>' + jt + '</option>';
            });
            jobTypeOptions += '</select>';
            
            html += '<tr><td><input type="date" class="vac-date" value="' + dateString + '" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td><td><input type="text" class="vac-location" value="' + location + '" style="width: 100%; padding: 4px; border: 1px solid #ddd;" disabled></td><td>' + jobTypeOptions + '</td><td><button class="btn-secondary" onclick="removeVacancyRow(this)" style="padding: 4px 8px; font-size: 12px;">Remove</button></td></tr>';
        });
        html += '</table>';
        container.innerHTML = html;
    }
    
    function parseDate(dateStr) {
        if (!dateStr) return new Date(0);
        if (dateStr.includes('/')) {
            const [day, month, year] = dateStr.split('/');
            return new Date(year, month - 1, day);
        }
        return new Date(dateStr);
    }

    function addVacancyRow() {
        const container = document.getElementById('vacanciesContainer');
        let table = container.querySelector('table');
        const location = userLocations[0];
        
        if (!table) {
            let html = '<table class="vacancies-table"><tr><th>Date</th><th>Location</th><th>Job Type</th><th>Action</th></tr></table>';
            container.innerHTML = html;
            table = container.querySelector('table');
        }
        
        const newRow = table.insertRow();
        newRow.innerHTML = '<td><input type="date" class="vac-date" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td><td><input type="text" class="vac-location" value="' + location + '" style="width: 100%; padding: 4px; border: 1px solid #ddd;" disabled></td><td><select class="vac-jobtype" style="width: 100%; padding: 4px; border: 1px solid #ddd;"><option value="">Select Job Type</option></select></td><td><button class="btn-secondary" onclick="removeVacancyRow(this)" style="padding: 4px 8px; font-size: 12px;">Remove</button></td>';
    }

    function removeVacancyRow(btn) {
        btn.parentElement.parentElement.remove();
    }

    function saveVacancies() {
        const rows = document.querySelectorAll('#vacanciesContainer table tr');
        const vacancies = [];
        
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const dateInput = row.querySelector('.vac-date');
            const jobtypeInput = row.querySelector('.vac-jobtype');
            const locationInput = row.querySelector('.vac-location');
            
            if (dateInput && jobtypeInput && locationInput) {
                let date = dateInput.value;
                const jobType = jobtypeInput.value;
                const location = locationInput.value;
                
                if (date && date.includes('-')) {
                    const [year, month, day] = date.split('-');
                    date = day + '/' + month + '/' + year;
                }
                
                if (date && jobType && location) {
                    vacancies.push({ date, jobType, location });
                }
            }
        }

        showMessage('Saving vacancies...', 'info');

        google.script.run.withSuccessHandler(function() {
            showMessage('✓ Vacancies saved successfully', 'success');
            loadOfficerData();
        }).saveOfficerVacancies(currentUser.email, vacancies);
    }

    function logout() {
        currentUser = null;
        userRole = null;
        userLocations = [];
        document.getElementById('mainDashboard').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('emailInput').value = '';
        document.getElementById('passwordInput').value = '';
    }
</script>

</body>
</html>
