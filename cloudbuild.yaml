steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/casualrosters/ruralrostersproxy:$COMMIT_SHA'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/casualrosters/ruralrostersproxy:latest'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/casualrosters/ruralrostersproxy:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - ruralrostersproxy-staging
      - '--image=australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/casualrosters/ruralrostersproxy:$COMMIT_SHA'
      - '--region=australia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/casualrosters/ruralrostersproxy:$COMMIT_SHA'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
